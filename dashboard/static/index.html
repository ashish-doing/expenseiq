<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpenseIQ — Business Expense Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    header span { background: #3b82f6; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; }
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px 0; }
    .kpi { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; }
    .kpi .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi .value { font-size: 2rem; font-weight: 700; margin-top: 6px; }
    .kpi.green .value { color: #10b981; }
    .kpi.blue .value { color: #3b82f6; }
    .kpi.orange .value { color: #f59e0b; }
    .kpi.red .value { color: #ef4444; }
    .charts-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 16px; padding: 24px 32px 0; }
    .chart-card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; }
    .chart-card h3 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-container { position: relative; height: 200px; }
    .table-section { padding: 24px 32px; }
    .table-section h3 { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; background: #1a1d2e; border-radius: 10px; overflow: hidden; border: 1px solid #2d3748; }
    th { background: #161927; color: #64748b; font-size: 0.75rem; text-transform: uppercase; padding: 10px 16px; text-align: left; }
    td { padding: 12px 16px; border-top: 1px solid #2d3748; font-size: 0.85rem; }
    .badge { padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
    .badge.AUTO_APPROVED, .badge.APPROVED { background: #064e3b; color: #10b981; }
    .badge.ESCALATED { background: #78350f; color: #f59e0b; }
    .badge.REJECTED { background: #7f1d1d; color: #ef4444; }
    .risk-bar { height: 6px; background: #2d3748; border-radius: 3px; width: 80px; display: inline-block; }
    .risk-fill { height: 100%; border-radius: 3px; }
    .footer { text-align: center; padding: 24px; color: #475569; font-size: 0.75rem; }
    .refresh-indicator { margin-left: auto; font-size: 0.75rem; color: #475569; }
  </style>
</head>
<body>
  <header>
    <h1>💼 ExpenseIQ</h1>
    <span>LIVE</span>
    <div class="refresh-indicator" id="lastRefresh">Loading...</div>
  </header>

  <div class="kpi-row">
    <div class="kpi blue"><div class="label">Total Submitted</div><div class="value" id="kpi-total">—</div></div>
    <div class="kpi green"><div class="label">Approved</div><div class="value" id="kpi-approved">—</div></div>
    <div class="kpi orange"><div class="label">Escalated</div><div class="value" id="kpi-escalated">—</div></div>
    <div class="kpi red"><div class="label">Avg Risk Score</div><div class="value" id="kpi-risk">—</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Spend by Category</h3>
      <div class="chart-container"><canvas id="categoryChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Monthly Spend Trend</h3>
      <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Approval Rate</h3>
      <div class="chart-container"><canvas id="approvalChart"></canvas></div>
    </div>
  </div>

  <div class="table-section">
    <h3>Recent Expenses</h3>
    <table>
      <thead>
        <tr>
          <th>Submitter</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Risk</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="expenses-tbody">
        <tr><td colspan="6" style="text-align:center;color:#475569">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">ExpenseIQ — Kaggle AI Agents Capstone 2026 · Auto-refreshes every 10s</div>

<script>
  const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
  let categoryChart, monthlyChart, approvalChart;

  function initCharts() {
    categoryChart = new Chart(document.getElementById('categoryChart'), {
      type: 'doughnut',
      data: { labels: [], datasets: [{ data: [], backgroundColor: COLORS, borderWidth: 0 }] },
      options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }, cutout: '65%' }
    });

    monthlyChart = new Chart(document.getElementById('monthlyChart'), {
      type: 'bar',
      data: { labels: [], datasets: [{ label: 'Spend ($)', data: [], backgroundColor: '#3b82f6', borderRadius: 4 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e2535' } }, y: { ticks: { color: '#64748b' }, grid: { color: '#1e2535' } } } }
    });

    approvalChart = new Chart(document.getElementById('approvalChart'), {
      type: 'doughnut',
      data: { labels: ['Approved', 'Escalated', 'Rejected'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], borderWidth: 0 }] },
      options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }, cutout: '65%' }
    });
  }

  async function refresh() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();

      document.getElementById('kpi-total').textContent = data.total_submitted;
      document.getElementById('kpi-approved').textContent = data.total_approved;
      document.getElementById('kpi-escalated').textContent = data.total_escalated;
      document.getElementById('kpi-risk').textContent = (data.avg_risk_score * 100).toFixed(0) + '%';

      const cats = data.by_category || {};
      categoryChart.data.labels = Object.keys(cats);
      categoryChart.data.datasets[0].data = Object.values(cats);
      categoryChart.update();

      const months = data.by_month || {};
      monthlyChart.data.labels = Object.keys(months);
      monthlyChart.data.datasets[0].data = Object.values(months);
      monthlyChart.update();

      approvalChart.data.datasets[0].data = [data.total_approved, data.total_escalated, data.total_rejected];
      approvalChart.update();

      const tbody = document.getElementById('expenses-tbody');
      const expenses = data.recent_expenses || [];
      tbody.innerHTML = expenses.map(e => {
        const exp = e.expense || {};
        const risk = (e.risk_score || 0);
        const riskColor = risk >= 0.8 ? '#ef4444' : risk >= 0.4 ? '#f59e0b' : '#10b981';
        return `<tr>
          <td>${exp.submitter || '—'}</td>
          <td>${exp.category || '—'}</td>
          <td>$${parseFloat(exp.amount || 0).toFixed(2)}</td>
          <td><span class="badge ${e.status}">${e.status}</span></td>
          <td><span class="risk-bar"><span class="risk-fill" style="width:${risk*100}%;background:${riskColor}"></span></span></td>
          <td>${(e.timestamp || '').slice(0, 10)}</td>
        </tr>`;
      }).join('');

      document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
      console.error('Refresh failed:', e);
    }
  }

  initCharts();
  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
