<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ExpenseIQ architecture data flow diagram</title>
<desc>Expense JSON flows through Safety Gate, branches to three paths: auto-approve, multi-agent review pipeline, and high-risk escalation, all converging at record_outcome.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.box-gray { fill: #f1f5f9; stroke: #94a3b8; }
.box-red  { fill: #fef2f2; stroke: #f87171; }
.box-teal { fill: #f0fdf4; stroke: #34d399; }
.box-amber{ fill: #fffbeb; stroke: #fbbf24; }
.box-purple{fill: #faf5ff; stroke: #a78bfa; }
.box-blue { fill: #eff6ff; stroke: #60a5fa; }
.lbl { font-family: system-ui,sans-serif; font-size: 13px; font-weight: 600; fill: #1e293b; }
.sub { font-family: system-ui,sans-serif; font-size: 11px; fill: #64748b; }
.arr { stroke: #94a3b8; stroke-width: 1; fill: none; }
.dash{ stroke: #94a3b8; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
@media (prefers-color-scheme: dark) {
.box-gray  { fill: #1e293b; stroke: #475569; }
.box-red   { fill: #2d1515; stroke: #f87171; }
.box-teal  { fill: #052e16; stroke: #34d399; }
.box-amber { fill: #2d1f00; stroke: #fbbf24; }
.box-purple{ fill: #1e1030; stroke: #a78bfa; }
.box-blue  { fill: #0c1a2e; stroke: #60a5fa; }
.lbl { fill: #e2e8f0; }
.sub { fill: #94a3b8; }
}
</style>
</defs>

<!-- INPUT -->
<rect x="240" y="20" width="200" height="44" rx="8" class="box-gray"/>
<text class="lbl" x="340" y="39" text-anchor="middle">Expense JSON</text>
<text class="sub" x="340" y="55" text-anchor="middle">submitter · amount · category · desc</text>
<line x1="340" y1="64" x2="340" y2="97" class="arr" marker-end="url(#arrow)"/>

<!-- PARSE -->
<rect x="240" y="98" width="200" height="44" rx="8" class="box-gray"/>
<text class="lbl" x="340" y="117" text-anchor="middle">parse_expense</text>
<text class="sub" x="340" y="133" text-anchor="middle">UUID · session memory loaded</text>
<line x1="340" y1="142" x2="340" y2="175" class="arr" marker-end="url(#arrow)"/>

<!-- SAFETY GATE -->
<rect x="190" y="176" width="300" height="56" rx="8" class="box-red"/>
<text class="lbl" x="340" y="197" text-anchor="middle">security_checkpoint — SAFETY GATE</text>
<text class="sub" x="340" y="215" text-anchor="middle">PII redact → injection detect → risk score 0–1</text>

<!-- Branch lines -->
<path d="M190 204 L100 204 L100 289" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="232" x2="340" y2="289" class="arr" marker-end="url(#arrow)"/>
<path d="M490 204 L580 204 L580 289" class="arr" marker-end="url(#arrow)"/>

<!-- Branch labels -->
<text class="sub" x="100" y="263" text-anchor="middle">risk &lt; 0.40</text>
<text class="sub" x="100" y="277" text-anchor="middle">amount &lt; $100</text>
<text class="sub" x="340" y="263" text-anchor="middle">amount ≥ $100, risk &lt; 0.80</text>
<text class="sub" x="580" y="263" text-anchor="middle">risk ≥ 0.80 / injection</text>

<!-- AUTO-APPROVE -->
<rect x="28" y="290" width="144" height="44" rx="8" class="box-teal"/>
<text class="lbl" x="100" y="309" text-anchor="middle">auto_approve</text>
<text class="sub" x="100" y="325" text-anchor="middle">0 LLM · ~100ms</text>

<!-- HIGH-RISK -->
<rect x="508" y="290" width="144" height="44" rx="8" class="box-amber"/>
<text class="lbl" x="580" y="309" text-anchor="middle">high_risk_node</text>
<text class="sub" x="580" y="325" text-anchor="middle">LLM bypassed · ESCALATED</text>

<!-- PolicyAgent -->
<rect x="240" y="290" width="200" height="44" rx="8" class="box-purple"/>
<text class="lbl" x="340" y="309" text-anchor="middle">PolicyAgent</text>
<text class="sub" x="340" y="325" text-anchor="middle">lookup_expense_policy tool</text>
<line x1="340" y1="334" x2="340" y2="357" class="arr" marker-end="url(#arrow)"/>

<!-- BudgetCheck -->
<rect x="240" y="358" width="200" height="44" rx="8" class="box-purple"/>
<text class="lbl" x="340" y="377" text-anchor="middle">budget_check_node</text>
<text class="sub" x="340" y="393" text-anchor="middle">SQLite dept spend · budget status</text>
<line x1="340" y1="402" x2="340" y2="425" class="arr" marker-end="url(#arrow)"/>

<!-- LLMReviewer -->
<rect x="220" y="426" width="240" height="56" rx="8" class="box-blue"/>
<text class="lbl" x="340" y="447" text-anchor="middle">LLMReviewer</text>
<text class="sub" x="340" y="463" text-anchor="middle">policy · budget · history · security ctx</text>
<text class="sub" x="340" y="477" text-anchor="middle">→ review_reason</text>
<line x1="340" y1="482" x2="340" y2="505" class="arr" marker-end="url(#arrow)"/>

<!-- ReviewValidator -->
<rect x="220" y="506" width="240" height="56" rx="8" class="box-blue"/>
<text class="lbl" x="340" y="527" text-anchor="middle">ReviewValidator</text>
<text class="sub" x="340" y="543" text-anchor="middle">purpose · amount · justification?</text>
<text class="sub" x="340" y="559" text-anchor="middle">PASS → out · REVISE → guard</text>

<!-- REVISE back-edge -->
<text class="sub" x="172" y="530" text-anchor="middle">REVISE</text>
<text class="sub" x="172" y="544" text-anchor="middle">max 3×</text>
<path d="M220 535 L172 535 L172 452 L220 452" class="dash" marker-end="url(#arrow)"/>

<!-- PASS arrow -->
<line x1="340" y1="562" x2="340" y2="619" class="arr" marker-end="url(#arrow)"/>
<text class="sub" x="355" y="594">PASS</text>

<!-- Converge to record_outcome -->
<path d="M100 334 L100 638 L239 638" class="arr" marker-end="url(#arrow)"/>
<path d="M580 334 L580 638 L461 638" class="arr" marker-end="url(#arrow)"/>

<!-- RECORD OUTCOME -->
<rect x="240" y="620" width="200" height="44" rx="8" class="box-teal"/>
<text class="lbl" x="340" y="639" text-anchor="middle">record_outcome</text>
<text class="sub" x="340" y="655" text-anchor="middle">flat record → SQLite → dashboard</text>
<line x1="340" y1="664" x2="340" y2="697" class="arr" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<rect x="200" y="698" width="280" height="28" rx="8" class="box-gray"/>
<text class="sub" x="340" y="712" text-anchor="middle">AUTO_APPROVED · APPROVED · ESCALATED</text>
</svg>